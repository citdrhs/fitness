{% extends "base.html" %}
{% block title %}Create Account — Deeprun Performance Center{% endblock %}

{% block content %}
<div class="form-container">
  <h2>Create <span>Account</span></h2>

  {% if error %}
    <div class="error-banner">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('signup') }}">

    <span class="form-label">I am a…</span>
    <select name="type" required>
      <option value="" disabled selected>Select role</option>
      <option value="Student">Student</option>
      <option value="Coach">Coach</option>
    </select>

    <span class="form-label">Team</span>
    <ul id="teamDropdowns">
      <select name="team" id="team">
        <option value="none">None</option>
        {% for team in teams %}
          <option value="{{ team }}">{{ team }}</option>
        {% endfor %}
      </select>
    </ul>
    <button type="button" onclick="addTeamSlot()" class="btn secondary" style="margin-bottom:1rem;font-size:0.75rem;padding:0.4rem 0.9rem;">+ Add Team</button>

    <input type="text"   name="name"     placeholder="Full Name"     required>
    <input type="email"  name="email"    placeholder="Email"         required>
    <input type="password" name="password" placeholder="Password"   required>
    <input type="number" name="age"      placeholder="Age">
    <input type="text"   name="goal"     placeholder="Fitness Goal">

    <button type="submit" class="btn">Create Account</button>
  </form>

  <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
</div>

<script>
function addTeamSlot() {
  var container  = document.getElementById('teamDropdowns');
  var existing   = container.querySelector('select');
  if (!existing) return;
  var clone      = existing.cloneNode(true);
  clone.value    = 'none';
  container.appendChild(clone);
}
</script>
{% endblock %}
