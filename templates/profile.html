{% extends "base.html" %}
{% block title %}Profile — Deeprun Performance Center{% endblock %}

{% block content %}
<div class="wrap">
  <div class="page-head">
    <div>
      <h2>Profile</h2>
      <p>Manage your account information</p>
    </div>
  </div>

  <div class="profile-header">
    <h2>{{ username }}</h2>
    <div class="profile-fields">
      <div class="pf"><span class="lbl">Name</span><span class="val">{{ username }}</span></div>
      <div class="pf"><span class="lbl">Email</span><span class="val">{{ email }}</span></div>
      <div class="pf"><span class="lbl">Age</span><span class="val">{{ age }}</span></div>
      <div class="pf"><span class="lbl">Goal</span><span class="val">{{ goal }}</span></div>
    </div>
  </div>

  <div class="profile-update">
    <h3>Update Info</h3>
    <form method="POST" action="{{ url_for('profile') }}">
      <input type="number" name="age"  placeholder="Age"      value="{{ age }}">
      <input type="text"   name="goal" placeholder="New goal" value="{{ goal }}">
      <button type="submit" class="btn">Save Changes</button>
    </form>
  </div>
</div>
{% endblock %}
