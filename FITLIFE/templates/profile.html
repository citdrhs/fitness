{% extends "base.html" %}
{% block title %}Profile — FitLife{% endblock %}

{% block content %}
<section class="auth">
  <div class="auth-card reveal">
    <h2>Profile</h2>
    <p class="muted">Update your basic info.</p>

    <div class="profile-box">
      <div class="row"><span class="muted">Username</span><span>{{ user['username'] }}</span></div>
      <div class="row"><span class="muted">Email</span><span>{{ user['email'] }}</span></div>
      <div class="row"><span class="muted">Role</span><span>{{ user['role'] }}</span></div>
    </div>

    <form method="POST" class="form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <label>
        <span>Age</span>
        <input type="number" name="age" min="0" max="120" value="{{ user['age'] if user['age'] is not none else '' }}" placeholder="optional">
      </label>

      <label>
        <span>Goal</span>
        <input name="goal" value="{{ user['goal'] or '' }}" placeholder="e.g. improve endurance, hit PRs">
      </label>

      <button class="btn w-full" type="submit">Save</button>
    </form>
  </div>
</section>
{% endblock %}
